<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyEngine V3</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app ev" id="app">
    <div class="bgGrid"></div>
    <div class="bgGlow bgGlowA"></div>
    <div class="bgGlow bgGlowB"></div>
    <div class="speedLines" id="speedLines"></div>
    <div class="noise"></div>

    <header class="topbar">
      <div class="modePill" id="modePill">EV BEAST</div>
      <div class="systemText" id="systemText">CORE ONLINE</div>
    </header>

    <main class="dashboard">
      <section class="side sideLeft">
        <div class="ringCard bigCard">
          <div class="ringTitle">POWER ARC</div>
          <div class="ring ringPower" id="powerRing">
            <div class="ringHalo"></div>
            <div class="ringInner">
              <div class="ringValue" id="powerValue">38</div>
              <div class="ringUnit">FLOW</div>
            </div>
          </div>
          <div class="ringCaption" id="powerCaption">electric pulse stable</div>
        </div>
      </section>

      <section class="centerCore">
        <div class="heroStats">
          <div class="heroChip">
            <div class="heroName">MODE</div>
            <div class="heroVal" id="heroMode">EV</div>
          </div>
          <div class="heroChip">
            <div class="heroName">STAGE</div>
            <div class="heroVal" id="stageValue">E-DRIVE</div>
          </div>
          <div class="heroChip">
            <div class="heroName">PEAK</div>
            <div class="heroVal" id="peakValue">CALM</div>
          </div>
        </div>

        <div class="coreShell" id="coreShell">
          <div class="orbit orbit1"></div>
          <div class="orbit orbit2"></div>
          <div class="orbit orbit3"></div>

          <div class="shockContainer" id="shockContainer"></div>

          <div class="coreAura coreAura1"></div>
          <div class="coreAura coreAura2"></div>

          <div class="core" id="core">
            <div class="coreSpin coreSpinA"></div>
            <div class="coreSpin coreSpinB"></div>
            <div class="coreCenter">
              <div class="coreLabel">CORE</div>
              <div class="coreMode" id="coreMode">EV</div>
            </div>
          </div>

          <div class="coreTicks">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
          </div>
        </div>

        <div class="miniMeterRow">
          <div class="miniMeter">
            <div class="miniLabel">SURGE</div>
            <div class="miniTrack"><div class="miniFill" id="surgeBar"></div></div>
            <div class="miniVal" id="surgeValue">22</div>
          </div>
          <div class="miniMeter">
            <div class="miniLabel">THRUST</div>
            <div class="miniTrack"><div class="miniFill" id="thrustBar"></div></div>
            <div class="miniVal" id="thrustValue">14</div>
          </div>
          <div class="miniMeter">
            <div class="miniLabel">HEAT</div>
            <div class="miniTrack"><div class="miniFill" id="heatBar"></div></div>
            <div class="miniVal" id="heatValue">08</div>
          </div>
          <div class="miniMeter">
            <div class="miniLabel">OUTPUT</div>
            <div class="miniTrack"><div class="miniFill" id="outputBar"></div></div>
            <div class="miniVal" id="outputValue">31</div>
          </div>
        </div>
      </section>

      <section class="side sideRight">
        <div class="ringCard bigCard">
          <div class="ringTitle">BOOST ARC</div>
          <div class="ring ringBoost" id="boostRing">
            <div class="ringHalo"></div>
            <div class="ringInner">
              <div class="ringValue" id="boostValue">12</div>
              <div class="ringUnit">BOOST</div>
            </div>
          </div>
          <div class="ringCaption" id="boostCaption">standby pressure</div>
        </div>
      </section>
    </main>

    <section class="lowerHud">
      <div class="barCard">
        <div class="barHeader">
          <span>REACTOR LOAD</span>
          <span id="reactorPct">34%</span>
        </div>
        <div class="barOuter">
          <div class="barFill" id="reactorBar"></div>
        </div>
      </div>

      <div class="barCard">
        <div class="barHeader">
          <span>TURBO PRESSURE</span>
          <span id="turboPct">08%</span>
        </div>
        <div class="barOuter">
          <div class="barFill turboFill" id="turboBar"></div>
        </div>
      </div>

      <div class="barCard">
        <div class="barHeader">
          <span>IGNITION SYNC</span>
          <span id="syncPct">19%</span>
        </div>
        <div class="barOuter">
          <div class="barFill syncFill" id="syncBar"></div>
        </div>
      </div>
    </section>

    <section class="controls">
      <button class="actionBtn evBtn" id="evBtn">
        <span class="btnGlow"></span>
        <span class="btnLabelTop">EV</span>
        <span class="btnLabelBottom">RETURN</span>
      </button>

      <button class="actionBtn startBtn" id="startBtn">
        <span class="btnGlow"></span>
        <span class="btnLabelTop">START</span>
        <span class="btnLabelBottom">ENGINE</span>
      </button>

      <button class="actionBtn turboBtn" id="turboBtn">
        <span class="btnGlow"></span>
        <span class="btnLabelTop">TURBO</span>
        <span class="btnLabelBottom">MODE</span>
      </button>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>

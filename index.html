<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyEngine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app ev">

  <!-- CORE -->
  <div class="coreWrap">
    <div class="core">
      <div class="coreInner"></div>
    </div>
    <div class="label">CORE</div>
  </div>

  <!-- LEFT ARC -->
  <div class="arc left">
    <div class="arcFill" id="powerArc"></div>
    <div class="arcLabel">POWER</div>
  </div>

  <!-- RIGHT ARC -->
  <div class="arc right">
    <div class="arcFill" id="boostArc"></div>
    <div class="arcLabel">BOOST</div>
  </div>

  <!-- STATUS -->
  <div class="status" id="statusText">EV MODE</div>

  <!-- BUTTONS -->
  <div class="controls">
    <button id="startBtn">START<br>ENGINE</button>
    <button id="turboBtn">TURBO</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>

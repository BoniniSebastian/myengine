<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyEngine Tesla</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app ev" id="app">
    <div class="bgGrid"></div>
    <div class="bgGlow bgGlowA"></div>
    <div class="bgGlow bgGlowB"></div>
    <div class="speedLines"></div>
    <div class="noise"></div>

    <header class="topbar">
      <div class="modePill" id="modePill">EV BEAST</div>
      <div class="systemText" id="systemText">CORE ONLINE</div>
    </header>

    <main class="dashboard">
      <section class="sideCluster leftCluster">
        <div class="sideDialWrap">
          <div class="sideDialLabel">POWER</div>
          <div class="sideDial" id="powerDial">
            <div class="sideDialInner">
              <div class="sideDialValue" id="powerValue">38</div>
              <div class="sideDialUnit">FLOW</div>
            </div>
          </div>
        </div>

        <div class="sideMiniText" id="powerCaption">electric pulse stable</div>
      </section>

      <section class="centerCore">
        <div class="coreShell">
          <div class="outerArc leftArc" id="leftArc"></div>
          <div class="outerArc rightArc" id="rightArc"></div>

          <div class="orbit orbit1"></div>
          <div class="orbit orbit2"></div>
          <div class="orbit orbit3"></div>

          <div class="shockContainer" id="shockContainer"></div>

          <div class="coreAura coreAura1"></div>
          <div class="coreAura coreAura2"></div>

          <div class="core" id="core">
            <div class="coreSpin coreSpinA"></div>
            <div class="coreSpin coreSpinB"></div>
            <div class="coreCenter">
              <div class="coreLabel">CORE</div>
              <div class="coreMode" id="coreMode">EV</div>
              <div class="coreStage" id="stageText">E-DRIVE</div>
            </div>
          </div>
        </div>

        <div class="miniDialRow">
          <div class="miniDial" id="surgeDial">
            <div class="miniDialTitle">SURGE</div>
            <div class="miniDialRing">
              <div class="miniDialInner">
                <div class="miniDialVal" id="surgeValue">22</div>
              </div>
            </div>
          </div>

          <div class="miniDial" id="thrustDial">
            <div class="miniDialTitle">THRUST</div>
            <div class="miniDialRing">
              <div class="miniDialInner">
                <div class="miniDialVal" id="thrustValue">14</div>
              </div>
            </div>
          </div>

          <div class="miniDial" id="heatDial">
            <div class="miniDialTitle">HEAT</div>
            <div class="miniDialRing">
              <div class="miniDialInner">
                <div class="miniDialVal" id="heatValue">08</div>
              </div>
            </div>
          </div>
        </div>

        <section class="statusRails">
          <div class="railRow">
            <div class="railLabel">REACTOR LOAD</div>
            <div class="railTrack">
              <div class="railFill" id="reactorBar"></div>
            </div>
            <div class="railPct" id="reactorPct">34%</div>
          </div>

          <div class="railRow">
            <div class="railLabel">TURBO PRESSURE</div>
            <div class="railTrack">
              <div class="railFill turboFill" id="turboBar"></div>
            </div>
            <div class="railPct" id="turboPct">08%</div>
          </div>

          <div class="railRow">
            <div class="railLabel">IGNITION SYNC</div>
            <div class="railTrack">
              <div class="railFill syncFill" id="syncBar"></div>
            </div>
            <div class="railPct" id="syncPct">19%</div>
          </div>
        </section>

        <section class="controlPod" aria-label="Kontroller">
          <button class="podBtn podBtn-left evBtn" id="evBtn">
            <span class="podGlow"></span>
            <span class="podTop">EV</span>
            <span class="podBottom">RETURN</span>
          </button>

          <button class="podBtn podBtn-center startBtn" id="startBtn">
            <span class="podGlow"></span>
            <span class="podTop">START</span>
            <span class="podBottom">ENGINE</span>
          </button>

          <button class="podBtn podBtn-right turboBtn" id="turboBtn">
            <span class="podGlow"></span>
            <span class="podTop">TURBO</span>
            <span class="podBottom">MODE</span>
          </button>
        </section>
      </section>

      <section class="sideCluster rightCluster">
        <div class="sideDialWrap">
          <div class="sideDialLabel">BOOST</div>
          <div class="sideDial" id="boostDial">
            <div class="sideDialInner">
              <div class="sideDialValue" id="boostValue">12</div>
              <div class="sideDialUnit">BOOST</div>
            </div>
          </div>
        </div>

        <div class="sideMiniText" id="boostCaption">standby pressure</div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
